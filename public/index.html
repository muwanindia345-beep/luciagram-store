<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuciaStore</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a0533, #0d0d1a); padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a1550; position: sticky; top: 0; z-index: 100; }
  .header-logo { width: 36px; height: 36px; background: linear-gradient(135deg, #7c3aed, #db2777); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
  .header h1 { font-size: 1.3rem; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .hero { background: linear-gradient(135deg, #1a0533 0%, #0d0d1a 100%); padding: 30px 20px; text-align: center; border-bottom: 1px solid #2a1550; }
  .app-icon { width: 100px; height: 100px; border-radius: 24px; margin: 0 auto 14px; overflow: hidden; box-shadow: 0 8px 32px rgba(124,58,237,0.5); border: 2px solid #7c3aed; }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; }
  .app-icon-fallback { width: 100%; height: 100%; background: linear-gradient(135deg, #4c1d95, #831843); display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .app-name { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .app-dev { color: #a855f7; font-size: 0.85rem; margin-top: 4px; }
  .ratings { display: flex; justify-content: center; gap: 30px; margin-top: 18px; }
  .rating-item { text-align: center; }
  .rating-item .val { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .rating-item .lbl { font-size: 0.7rem; color: #888; margin-top: 2px; }

  .channels { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .channel-card { background: #13131f; border: 1px solid #2a1550; border-radius: 16px; padding: 18px; }
  .channel-card.beta { border-color: #1e3a5f; }
  .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .channel-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .stable-badge { background: linear-gradient(135deg, #7c3aed, #db2777); }
  .beta-badge { background: linear-gradient(135deg, #1d4ed8, #0891b2); }
  .channel-version { font-size: 0.8rem; color: #888; }
  .channel-info { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
  .info-item { font-size: 0.78rem; color: #aaa; }
  .info-item span { color: #fff; font-weight: 600; }

  .download-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
  .stable-btn { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; }
  .beta-btn { background: linear-gradient(135deg, #1d4ed8, #0891b2); color: #fff; }
  .download-btn:active { transform: scale(0.97); opacity: 0.9; }
  .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .progress-wrap { display: none; margin-top: 14px; }
  .progress-bar-bg { background: #2a2a3a; border-radius: 10px; height: 10px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 10px; width: 0%; transition: width 0.2s ease; }
  .stable-progress { background: linear-gradient(90deg, #7c3aed, #db2777); }
  .beta-progress { background: linear-gradient(90deg, #1d4ed8, #0891b2); }
  .progress-stats { display: flex; justify-content: space-between; margin-top: 8px; }
  .progress-text { font-size: 0.75rem; color: #aaa; }
  .speed-text { font-size: 0.75rem; color: #a855f7; font-weight: 600; }

  .changelog { background: #0f0f1a; border-radius: 10px; padding: 12px; margin-top: 10px; font-size: 0.78rem; color: #aaa; line-height: 1.7; white-space: pre-wrap; }
  .changelog-title { color: #a855f7; font-weight: 600; margin-bottom: 6px; font-size: 0.82rem; }

  .features { padding: 0 20px 30px; }
  .features h3 { font-size: 1rem; color: #a855f7; margin-bottom: 12px; }
  .feature-list { display: flex; flex-direction: column; gap: 10px; }
  .feature-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #ccc; }
  .feature-dot { width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #db2777); flex-shrink: 0; }

  .loading { text-align: center; padding: 40px; color: #888; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2a1550; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-release { text-align: center; padding: 30px; color: #666; font-size: 0.9rem; }
  .error-msg { background: #1a0a0a; border: 1px solid #5f1a1a; border-radius: 12px; padding: 16px; text-align: center; color: #f87171; font-size: 0.85rem; margin: 10px 0; }
  .retry-btn { margin-top: 10px; padding: 8px 20px; border: 1px solid #7c3aed; background: transparent; color: #a855f7; border-radius: 20px; font-size: 0.82rem; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">L</div>
  <h1>LuciaStore</h1>
</div>

<div class="hero">
  <div class="app-icon">
    <img src="https://raw.githubusercontent.com/muwanindia345-beep/Luciagram-/main/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
      onerror="this.parentElement.innerHTML='<div class=\'app-icon-fallback\'>🦋</div>'"
      alt="LuciaGram">
  </div>
  <div class="app-name">LuciaGram</div>
  <div class="app-dev">by Lucia International Society</div>
  <div class="ratings">
    <div class="rating-item"><div class="val">4.8★</div><div class="lbl">Rating</div></div>
    <div class="rating-item"><div class="val" id="dl-count">-</div><div class="lbl">Downloads</div></div>
    <div class="rating-item"><div class="val" id="app-size">-</div><div class="lbl">Size</div></div>
  </div>
</div>

<div class="channels" id="channels">
  <div class="loading"><div class="spinner"></div>Loading releases...</div>
</div>

<div class="features">
  <h3>✨ Features</h3>
  <div class="feature-list">
    <div class="feature-item"><div class="feature-dot"></div>Instagram-like feed & reels</div>
    <div class="feature-item"><div class="feature-dot"></div>Real-time messaging & group chats</div>
    <div class="feature-item"><div class="feature-dot"></div>Stories & highlights</div>
    <div class="feature-item"><div class="feature-dot"></div>Video & voice calls</div>
    <div class="feature-item"><div class="feature-dot"></div>Music sharing</div>
    <div class="feature-item"><div class="feature-dot"></div>Dark mode UI</div>
  </div>
</div>

<script>
let stableRelease = null;
let betaRelease = null;

async function loadReleases() {
  const container = document.getElementById('channels');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading releases...</div>';
  try {
    const res = await fetch('/api/releases');
    const releases = await res.json();
    if (!Array.isArray(releases)) throw new Error('Invalid response');
    stableRelease = releases.find(r => !r.prerelease) || null;
    betaRelease = releases.find(r => r.prerelease) || null;
    renderChannels();
  } catch (e) {
    container.innerHTML = `
      <div class="error-msg">
        ❌ Failed to load releases<br>
        <small>${e.message}</small><br>
        <button class="retry-btn" onclick="loadReleases()">🔄 Retry</button>
      </div>`;
  }
}

function formatSize(bytes) {
  if (!bytes) return '?';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr);
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor(diff / 3600000);
  if (hours < 1) return 'Just now';
  if (hours < 24) return hours + 'h ago';
  if (days === 1) return 'Yesterday';
  return days + ' days ago';
}

function renderChannels() {
  const container = document.getElementById('channels');
  let html = '';

  if (stableRelease) {
    const apk = stableRelease.assets.find(a => a.name.endsWith('.apk'));
    const size = apk ? formatSize(apk.size) : '?';
    const dlCount = apk ? apk.download_count.toLocaleString() : '0';
    document.getElementById('app-size').textContent = size;
    document.getElementById('dl-count').textContent = dlCount;
    html += `
    <div class="channel-card">
      <div class="channel-header">
        <span class="channel-badge stable-badge">✅ STABLE</span>
        <span class="channel-version">${stableRelease.tag_name}</span>
      </div>
      <div class="channel-info">
        <div class="info-item">📦 Size: <span>${size}</span></div>
        <div class="info-item">🕐 Updated: <span>${timeAgo(stableRelease.published_at)}</span></div>
        <div class="info-item">⬇ Downloads: <span>${dlCount}</span></div>
      </div>
      <div class="changelog">
        <div class="changelog-title">📋 What's new</div>
        ${stableRelease.body || 'Bug fixes and improvements.'}
      </div>
      <button class="download-btn stable-btn" id="stable-btn" onclick="startDownload('stable', this)">⬇ Download Stable</button>
      <div class="progress-wrap" id="stable-progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar stable-progress" id="stable-bar"></div></div>
        <div class="progress-stats">
          <div class="progress-text" id="stable-text">Preparing...</div>
          <div class="speed-text" id="stable-speed"></div>
        </div>
      </div>
    </div>`;
  }

  if (betaRelease) {
    const apk = betaRelease.assets.find(a => a.name.endsWith('.apk'));
    const size = apk ? formatSize(apk.size) : '?';
    html += `
    <div class="channel-card beta">
      <div class="channel-header">
        <span class="channel-badge beta-badge">🧪 BETA</span>
        <span class="channel-version">${betaRelease.tag_name}</span>
      </div>
      <div class="channel-info">
        <div class="info-item">📦 Size: <span>${size}</span></div>
        <div class="info-item">🕐 Updated: <span>${timeAgo(betaRelease.published_at)}</span></div>
      </div>
      <div class="changelog">
        <div class="changelog-title">🧪 Beta changes</div>
        ${betaRelease.body || 'Testing new features — may have bugs.'}
      </div>
      <button class="download-btn beta-btn" id="beta-btn" onclick="startDownload('beta', this)">🧪 Download Beta</button>
      <div class="progress-wrap" id="beta-progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar beta-progress" id="beta-bar"></div></div>
        <div class="progress-stats">
          <div class="progress-text" id="beta-text">Preparing...</div>
          <div class="speed-text" id="beta-speed"></div>
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html || '<div class="no-release">🚀 No releases yet. Check back soon!</div>';
}

async function startDownload(channel, btn) {
  const wrap = document.getElementById(channel + '-progress-wrap');
  const bar = document.getElementById(channel + '-bar');
  const text = document.getElementById(channel + '-text');
  const speed = document.getElementById(channel + '-speed');

  wrap.style.display = 'block';
  btn.disabled = true;
  bar.style.width = '5%';
  text.textContent = 'Connecting...';
  speed.textContent = '';

  let lastLoaded = 0;
  let lastTime = Date.now();

  try {
    const response = await fetch('/download/' + channel);
    if (!response.ok) throw new Error('Server error ' + response.status);

    const total = parseInt(response.headers.get('content-length') || 0);
    const reader = response.body.getReader();
    let loaded = 0;
    const chunks = [];

    text.textContent = 'Downloading...';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;

      // Speed calc
      const now = Date.now();
      const timeDiff = (now - lastTime) / 1000;
      if (timeDiff >= 0.5) {
        const bytesPerSec = (loaded - lastLoaded) / timeDiff;
        speed.textContent = formatSpeed(bytesPerSec);
        lastLoaded = loaded;
        lastTime = now;
      }

      if (total > 0) {
        const pct = Math.min(Math.round((loaded / total) * 100), 99);
        bar.style.width = pct + '%';
        text.textContent = `${pct}% — ${formatSize(loaded)} / ${formatSize(total)}`;
      } else {
        text.textContent = `${formatSize(loaded)} downloaded`;
        bar.style.width = '60%';
      }
    }

    bar.style.width = '100%';
    speed.textContent = '';
    text.textContent = '💾 Saving file...';

    const blob = new Blob(chunks, { type: 'application/vnd.android.package-archive' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'LuciaGram-' + channel + '.apk';
    a.click();
    URL.revokeObjectURL(url);

    text.textContent = '✅ Done! Check Downloads folder.';
    btn.disabled = false;
    btn.textContent = '✅ Downloaded';

  } catch (e) {
    text.textContent = '❌ Failed: ' + e.message;
    speed.textContent = '';
    bar.style.width = '0%';
    btn.disabled = false;
  }
}

function formatSpeed(bps) {
  if (bps > 1024 * 1024) return (bps / 1024 / 1024).toFixed(1) + ' MB/s';
  if (bps > 1024) return (bps / 1024).toFixed(0) + ' KB/s';
  return bps.toFixed(0) + ' B/s';
}

loadReleases();
</script>
</body>
</html>
