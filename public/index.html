<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuciaStore</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .header { background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; }
  .header-logo { width: 34px; height: 34px; background: linear-gradient(135deg,#7c3aed,#db2777); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 17px; }
  .header h1 { font-size: 1.2rem; background: linear-gradient(135deg,#a855f7,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
  .hero { background: linear-gradient(160deg,#1a0533 0%,#0d0d1a 100%); padding: 28px 20px 20px; text-align: center; }
  .app-icon { width: 90px; height: 90px; border-radius: 22px; margin: 0 auto 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(124,58,237,0.5); border: 2px solid rgba(124,58,237,0.4); display: flex; align-items: center; justify-content: center; font-size: 46px; background: linear-gradient(135deg,#4c1d95,#831843); }
  .app-name { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg,#a855f7,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .app-dev { color: #a855f7; font-size: 0.82rem; margin-top: 4px; }
  .ratings { display: flex; justify-content: center; gap: 28px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.07); }
  .rating-item { text-align: center; }
  .rating-item .val { font-size: 1.1rem; font-weight: 700; }
  .rating-item .lbl { font-size: 0.68rem; color: #888; margin-top: 2px; }
  .star-rate { margin-top: 14px; }
  .star-rate p { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
  .stars { display: flex; justify-content: center; gap: 8px; }
  .star { font-size: 1.6rem; cursor: pointer; transition: transform 0.15s; filter: grayscale(1); opacity: 0.4; }
  .star:hover, .star.hover, .star.selected { filter: none; opacity: 1; transform: scale(1.2); }
  .star.selected { transform: scale(1.1); }
  .rate-thanks { font-size: 0.75rem; color: #a855f7; margin-top: 6px; display: none; }
  .tab-bar { display: flex; gap: 8px; padding: 14px 16px 0; background: #0a0a0f; position: sticky; top: 57px; z-index: 99; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .tab-btn { flex: 1; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px 12px 0 0; border-bottom: none; color: #888; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .tab-btn.active.stable { background: linear-gradient(135deg,rgba(124,58,237,0.2),rgba(219,39,119,0.2)); border-color: rgba(124,58,237,0.5); color: #fff; }
  .tab-btn.active.beta { background: linear-gradient(135deg,rgba(29,78,216,0.2),rgba(8,145,178,0.2)); border-color: rgba(29,78,216,0.5); color: #fff; }
  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }
  .channel-card { background: #13131f; border: 1px solid rgba(124,58,237,0.25); border-radius: 16px; padding: 18px; }
  .channel-card.beta { border-color: rgba(29,78,216,0.3); }
  .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .channel-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .stable-badge { background: linear-gradient(135deg,#7c3aed,#db2777); }
  .beta-badge { background: linear-gradient(135deg,#1d4ed8,#0891b2); }
  .channel-version { font-size: 0.78rem; color: #666; background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; }
  .channel-info { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .info-item { font-size: 0.78rem; color: #aaa; }
  .info-item span { color: #fff; font-weight: 600; }
  .changelog { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 0.8rem; color: #bbb; line-height: 1.7; }
  .changelog-title { color: #a855f7; font-weight: 700; margin-bottom: 6px; font-size: 0.82rem; }
  .download-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: block; position: relative; overflow: hidden; }
  .stable-btn { background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff; }
  .update-btn { background: linear-gradient(135deg,#059669,#0891b2); color: #fff; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,0.4)} 50%{box-shadow:0 0 0 10px rgba(5,150,105,0)} }
  .beta-btn { background: linear-gradient(135deg,#1d4ed8,#0891b2); color: #fff; }
  .download-btn:active { transform: scale(0.97); }
  .download-btn:disabled { opacity: 0.6; cursor: not-allowed; animation: none; }
  .progress-wrap { display: none; margin-top: 14px; padding-top: 4px; }
  .progress-bar-bg { background: #1e1e2e; border-radius: 10px; height: 9px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 10px; width: 0%; transition: width 0.2s ease; }
  .stable-progress { background: linear-gradient(90deg,#7c3aed,#db2777); }
  .beta-progress { background: linear-gradient(90deg,#1d4ed8,#0891b2); }
  .progress-stats { display: flex; justify-content: space-between; margin-top: 7px; }
  .progress-text,.speed-text { font-size: 0.74rem; color: #aaa; }
  .net-anim { display: inline-block; margin-right: 4px; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .features { padding: 16px; margin-top: 4px; padding-bottom: 30px; }
  .features h3 { font-size: 0.95rem; color: #a855f7; margin-bottom: 12px; font-weight: 700; }
  .feature-list { display: flex; flex-direction: column; gap: 9px; }
  .feature-item { display: flex; align-items: center; gap: 10px; font-size: 0.83rem; color: #ccc; }
  .feature-dot { width: 5px; height: 5px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed,#db2777); flex-shrink: 0; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .spinner { width: 28px; height: 28px; border: 3px solid #1e1e2e; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-release { text-align: center; padding: 40px 20px; color: #555; font-size: 0.9rem; }
  .beta-warning { background: rgba(29,78,216,0.1); border: 1px solid rgba(29,78,216,0.3); border-radius: 10px; padding: 10px 14px; font-size: 0.78rem; color: #93c5fd; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">L</div>
  <h1>LuciaStore</h1>
</div>
<div class="hero">
  <div class="app-icon">🦋</div>
  <div class="app-name">LuciaGram</div>
  <div class="app-dev">by Lucia International Society</div>
  <div class="ratings">
    <div class="rating-item"><div class="val" id="avg-rating">—</div><div class="lbl">Rating</div></div>
    <div class="rating-item"><div class="val" id="dl-count">—</div><div class="lbl">Downloads</div></div>
    <div class="rating-item"><div class="val" id="app-size">—</div><div class="lbl">Size</div></div>
  </div>
  <div class="star-rate">
    <p>Rate this app</p>
    <div class="stars" id="stars">
      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>
    </div>
    <div class="rate-thanks" id="rate-thanks">Thanks for rating! ❤️</div>
  </div>
</div>
<div class="tab-bar">
  <button class="tab-btn stable active" onclick="switchTab('stable')">✅ Stable</button>
  <button class="tab-btn beta" onclick="switchTab('beta')">🧪 Beta</button>
</div>
<div class="tab-content active" id="tab-stable">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>
<div class="tab-content" id="tab-beta">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>
<div class="features">
  <h3>✨ Features</h3>
  <div class="feature-list">
    <div class="feature-item"><div class="feature-dot"></div>Instagram-like feed & reels</div>
    <div class="feature-item"><div class="feature-dot"></div>Real-time messaging & group chats</div>
    <div class="feature-item"><div class="feature-dot"></div>Stories & highlights</div>
    <div class="feature-item"><div class="feature-dot"></div>Video & voice calls</div>
    <div class="feature-item"><div class="feature-dot"></div>Music sharing</div>
    <div class="feature-item"><div class="feature-dot"></div>Dark mode UI</div>
  </div>
</div>
<script>
let stableRelease = null, betaRelease = null;

// ===== RATING =====
async function loadRating() {
  try {
    const r = await (await fetch('/api/rating')).json();
    document.getElementById('avg-rating').textContent = r.count > 0 ? r.avg + '★' : '—';
  } catch {}
}

function initStars() {
  const rated = localStorage.getItem('rated');
  const stars = document.querySelectorAll('.star');
  if (rated) {
    stars.forEach((s,i) => { if (i < parseInt(rated)) s.classList.add('selected'); });
    document.getElementById('rate-thanks').style.display = 'block';
    return;
  }
  stars.forEach(s => {
    s.addEventListener('mouseover', () => {
      const v = parseInt(s.dataset.v);
      stars.forEach((st,i) => st.classList.toggle('hover', i < v));
    });
    s.addEventListener('mouseleave', () => stars.forEach(st => st.classList.remove('hover')));
    s.addEventListener('click', async () => {
      const v = parseInt(s.dataset.v);
      localStorage.setItem('rated', v);
      stars.forEach((st,i) => { st.classList.toggle('selected', i < v); st.classList.remove('hover'); });
      document.getElementById('rate-thanks').style.display = 'block';
      try {
        const r = await (await fetch('/api/rating', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({stars:v}) })).json();
        document.getElementById('avg-rating').textContent = r.avg + '★';
      } catch {}
    });
  });
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('.tab-btn.' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== RELEASES =====
async function loadReleases() {
  try {
    const releases = await (await fetch('/api/releases')).json();
    if (!Array.isArray(releases)) throw new Error('Bad response');
    stableRelease = releases.find(r => !r.prerelease) || null;
    betaRelease = releases.find(r => r.prerelease) || null;
    renderStable();
    renderBeta();
  } catch(e) {
    document.getElementById('tab-stable').innerHTML = '<div class="no-release">❌ Failed to load.<br><button onclick="loadReleases()" style="margin-top:10px;background:none;border:1px solid #444;color:#aaa;padding:6px 14px;border-radius:8px;cursor:pointer">🔄 Retry</button></div>';
    document.getElementById('tab-beta').innerHTML = '<div class="no-release">❌ Failed to load.</div>';
  }
}

function formatSize(b) { return b ? (b/1024/1024).toFixed(1)+' MB' : '?'; }
function formatSpeed(bps) {
  if (bps>1048576) return (bps/1048576).toFixed(1)+' MB/s';
  if (bps>1024) return (bps/1024).toFixed(0)+' KB/s';
  return bps.toFixed(0)+' B/s';
}
function timeAgo(d) {
  const h=Math.floor((Date.now()-new Date(d))/3600000), day=Math.floor(h/24);
  if (h<1) return 'Just now'; if (h<24) return h+'h ago';
  if (day===1) return 'Yesterday'; return day+' days ago';
}

function hasUpdate(channel, tag) {
  const saved = localStorage.getItem('dl_'+channel);
  const savedTime = localStorage.getItem('dl_time_'+channel);
  const release = channel === 'stable' ? stableRelease : betaRelease;
  const releaseTime = release?.published_at ? new Date(release.published_at).getTime() : 0;
  const downloadTime = savedTime ? parseInt(savedTime) : 0;
  // Update available if: tag changed OR newer release published after last download
  return saved && (saved !== tag || releaseTime > downloadTime);
}
function getBtn(channel, tag) {
  if (!localStorage.getItem('dl_'+channel)) return { cls: channel==='stable'?'stable-btn':'beta-btn', text: channel==='stable'?'⬇ Download Stable':'🧪 Download Beta' };
  if (hasUpdate(channel, tag)) return { cls: 'update-btn', text: '🔄 Update Available!' };
  return { cls: channel==='stable'?'stable-btn':'beta-btn', text: '✅ Downloaded' };
}

function renderStable() {
  const el = document.getElementById('tab-stable');
  if (!stableRelease) { el.innerHTML = '<div class="no-release">🚀 No stable release yet.</div>'; return; }
  const apk = stableRelease.assets.find(a => a.name.endsWith('.apk'));
  const size = formatSize(apk?.size);
  const dlCount = (apk?.download_count||0).toLocaleString();
  document.getElementById('app-size').textContent = size;
  document.getElementById('dl-count').textContent = dlCount;
  const btn = getBtn('stable', stableRelease.tag_name);
  el.innerHTML = `
  <div class="channel-card">
    <div class="channel-header">
      <span class="channel-badge stable-badge">✅ STABLE</span>
      <span class="channel-version">${stableRelease.tag_name}</span>
    </div>
    <div class="channel-info">
      <div class="info-item">📦 Size: <span>${size}</span></div>
      <div class="info-item">🕐 Updated: <span>${timeAgo(stableRelease.published_at)}</span></div>
      <div class="info-item">⬇ Downloads: <span>${dlCount}</span></div>
    </div>
    <div class="changelog"><div class="changelog-title">📋 What's new</div>${stableRelease.body||'Bug fixes and improvements.'}</div>
    <button class="download-btn ${btn.cls}" id="stable-btn" onclick="startDownload('stable',this,'${stableRelease.tag_name}')">${btn.text}</button>
    <div class="progress-wrap" id="stable-progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar stable-progress" id="stable-bar"></div></div>
      <div class="progress-stats"><div class="progress-text" id="stable-text"></div><div class="speed-text" id="stable-speed"></div></div>
    </div>
  </div>`;
}

function renderBeta() {
  const el = document.getElementById('tab-beta');
  if (!betaRelease) { el.innerHTML = '<div class="no-release">🧪 No beta release yet.<br><small style="color:#555;margin-top:8px;display:block">Push to the beta branch to publish.</small></div>'; return; }
  const apk = betaRelease.assets.find(a => a.name.endsWith('.apk'));
  const size = formatSize(apk?.size);
  const btn = getBtn('beta', betaRelease.tag_name);
  el.innerHTML = `
  <div class="beta-warning">⚠️ Beta builds may have bugs. Testing only.</div>
  <div class="channel-card beta">
    <div class="channel-header">
      <span class="channel-badge beta-badge">🧪 BETA</span>
      <span class="channel-version">${betaRelease.tag_name}</span>
    </div>
    <div class="channel-info">
      <div class="info-item">📦 Size: <span>${size}</span></div>
      <div class="info-item">🕐 Updated: <span>${timeAgo(betaRelease.published_at)}</span></div>
    </div>
    <div class="changelog"><div class="changelog-title">🧪 Beta changes</div>${betaRelease.body||'Testing new features.'}</div>
    <button class="download-btn ${btn.cls}" id="beta-btn" onclick="startDownload('beta',this,'${betaRelease.tag_name}')">${btn.text}</button>
    <div class="progress-wrap" id="beta-progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar beta-progress" id="beta-bar"></div></div>
      <div class="progress-stats"><div class="progress-text" id="beta-text"></div><div class="speed-text" id="beta-speed"></div></div>
    </div>
  </div>`;
}

async function startDownload(channel, btn, tag) {
  const wrap = document.getElementById(channel+'-progress-wrap');
  const bar = document.getElementById(channel+'-bar');
  const text = document.getElementById(channel+'-text');
  const speed = document.getElementById(channel+'-speed');
  wrap.style.display = 'block';
  btn.disabled = true;
  bar.style.width = '5%';
  text.innerHTML = '<span class="net-anim">📶</span> Connecting...';
  speed.textContent = '';
  let lastLoaded=0, lastTime=Date.now();
  try {
    const response = await fetch('/download/'+channel);
    if (!response.ok) throw new Error('Server error '+response.status);
    const total = parseInt(response.headers.get('content-length')||0);
    const reader = response.body.getReader();
    let loaded=0; const chunks=[];
    text.innerHTML = '<span class="net-anim">⬇</span> Downloading...';
    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      chunks.push(value); loaded += value.length;
      const now = Date.now();
      if (now-lastTime >= 400) {
        speed.textContent = formatSpeed((loaded-lastLoaded)/((now-lastTime)/1000));
        lastLoaded=loaded; lastTime=now;
      }
      if (total>0) {
        const pct = Math.min(Math.round(loaded/total*100),99);
        bar.style.width = pct+'%';
        text.innerHTML = `<span class="net-anim">⬇</span> ${pct}% — ${formatSize(loaded)} / ${formatSize(total)}`;
      } else {
        text.innerHTML = `<span class="net-anim">⬇</span> ${formatSize(loaded)} downloaded`;
        bar.style.width = '60%';
      }
    }
    bar.style.width = '100%';
    speed.textContent = '';
    text.textContent = '💾 Saving file...';
    const blob = new Blob(chunks,{type:'application/vnd.android.package-archive'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='LuciaGram-'+channel+'.apk'; a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem('dl_'+channel, tag);
    localStorage.setItem('dl_time_'+channel, Date.now().toString());
    text.textContent = '✅ Done! Check Downloads folder.';
    btn.disabled = false;
    btn.textContent = '✅ Downloaded';
    btn.className = 'download-btn ' + (channel==='stable'?'stable-btn':'beta-btn');
  } catch(e) {
    text.textContent = '❌ Failed: '+e.message;
    speed.textContent = ''; bar.style.width='0%';
    btn.disabled=false;
  }
}

loadReleases();
loadRating();
initStars();
</script>
</body>
</html>
